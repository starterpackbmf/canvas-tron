<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Canvas Tron — React</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#030612; --bg-2:#050a1a;
    --cyan:#00f0ff; --orange:#ff9d00;
    --white:#e9fbff; --muted:#6b8aa0; --danger:#ff3b5c;
  }
  *{box-sizing:border-box}
  html,body,#root{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:"Segoe UI",Inter,system-ui,sans-serif;user-select:none}

  /* ===== background grid ===== */
  .bg{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse at 30% 20%,rgba(0,240,255,.08),transparent 60%),
      radial-gradient(ellipse at 80% 90%,rgba(255,157,0,.06),transparent 60%),
      linear-gradient(var(--bg),var(--bg-2));
  }
  .bg::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(0,240,255,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,240,255,.06) 1px,transparent 1px);
    background-size:40px 40px;
    -webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);
    mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);
  }

  /* ===== toolbar ===== */
  .toolbar{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:8px;padding:8px 12px;
    background:rgba(5,12,24,.85);
    border:1px solid rgba(0,240,255,.35);
    border-radius:10px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 30px rgba(0,240,255,.15),inset 0 0 20px rgba(0,240,255,.05);
  }
  .tool{
    display:flex;align-items:center;gap:6px;padding:8px 12px;
    background:transparent;color:var(--white);
    border:1px solid rgba(0,240,255,.25);border-radius:6px;
    font-size:12px;font-weight:600;letter-spacing:.5px;
    cursor:pointer;text-transform:uppercase;transition:all .15s ease;
  }
  .tool:hover{background:rgba(0,240,255,.08);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.4);color:var(--cyan)}
  .tool.active{background:rgba(0,240,255,.15);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 14px rgba(0,240,255,.5)}
  .tool.danger:hover{background:rgba(255,59,92,.1);border-color:var(--danger);color:var(--danger);box-shadow:0 0 12px rgba(255,59,92,.4)}
  .sep{width:1px;background:rgba(0,240,255,.2);margin:4px 2px}

  .hint{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;
    color:var(--muted);font-size:11px;letter-spacing:.5px;
    background:rgba(5,12,24,.7);border:1px solid rgba(0,240,255,.2);
    padding:6px 14px;border-radius:20px;
  }
  .hint b{color:var(--cyan)}

  /* ===== drawing toolbar ===== */
  .drawbar{
    position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:10px;align-items:center;
    padding:8px 12px;
    background:rgba(5,12,24,.92);
    border:1px solid rgba(0,240,255,.35);
    border-radius:10px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 22px rgba(0,240,255,.15);
    animation:fadein .15s ease;
  }
  .drawbar .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .drawbar .group{display:flex;gap:4px;align-items:center}
  .drawbar .vsep{width:1px;align-self:stretch;background:rgba(0,240,255,.2);margin:0 2px}
  .shape-btn{
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    background:transparent;color:var(--white);
    border:1px solid rgba(0,240,255,.25);border-radius:6px;
    cursor:pointer;transition:all .12s ease;
    padding:0;
  }
  .shape-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .shape-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 10px rgba(0,240,255,.3)}
  .shape-btn.active{background:rgba(0,240,255,.15);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,240,255,.45)}
  .shape-btn.eraser.active{background:rgba(255,59,92,.15);border-color:var(--danger);color:var(--danger);box-shadow:0 0 12px rgba(255,59,92,.45)}
  .width-btn{
    width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    background:transparent;border:1px solid rgba(0,240,255,.25);border-radius:6px;
    cursor:pointer;transition:all .12s ease;
  }
  .width-btn:hover{border-color:var(--cyan)}
  .width-btn.active{border-color:var(--cyan);background:rgba(0,240,255,.1);box-shadow:0 0 10px rgba(0,240,255,.3)}
  .width-btn .dot{background:currentColor;border-radius:50%;box-shadow:0 0 6px currentColor}

  /* ===== format bar (rich text editor) ===== */
  .fmt-btn{
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;
    background:transparent;color:var(--white);
    border:1px solid rgba(0,240,255,.25);border-radius:6px;
    cursor:pointer;transition:all .12s ease;
    padding:0;font-size:14px;
  }
  .fmt-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 10px rgba(0,240,255,.3)}
  .fmt-btn.b{font-weight:800}
  .fmt-btn.i{font-style:italic;font-family:Georgia,serif}
  .fmt-btn.u{text-decoration:underline}

  /* ===== color palette ===== */
  .palette{
    position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:6px;align-items:center;
    padding:8px 12px;
    background:rgba(5,12,24,.9);
    border:1px solid rgba(0,240,255,.35);
    border-radius:10px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 20px rgba(0,240,255,.15);
    animation:fadein .15s ease;
  }
  @keyframes fadein{from{opacity:0;transform:translate(-50%,-6px)}to{opacity:1;transform:translate(-50%,0)}}
  .palette .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
  .swatch{
    width:22px;height:22px;border-radius:50%;
    border:2px solid rgba(255,255,255,.15);
    cursor:pointer;transition:all .12s ease;
    box-shadow:0 0 8px currentColor;
  }
  .swatch:hover{transform:scale(1.15);border-color:#fff}
  .swatch.custom{
    background:conic-gradient(#ff3b5c,#ffdd00,#00ff88,#00f0ff,#9d4bff,#ff3b9a,#ff3b5c);
    box-shadow:0 0 8px rgba(255,255,255,.3);
    position:relative;overflow:hidden;
  }
  .swatch.custom input{
    position:absolute;inset:0;opacity:0;cursor:pointer;
  }
  .zoom{
    position:fixed;bottom:14px;right:14px;z-index:10;
    color:var(--cyan);font-size:11px;
    background:rgba(5,12,24,.7);border:1px solid rgba(0,240,255,.2);
    padding:6px 12px;border-radius:4px;letter-spacing:.5px;
  }

  /* ===== workspace ===== */
  .workspace{position:fixed;inset:0;z-index:1;cursor:default}
  .workspace.tool-block{cursor:crosshair}
  .workspace.tool-note{cursor:text}
  .workspace.tool-draw{cursor:crosshair}
  .workspace.tool-eraser{cursor:not-allowed}
  .workspace.tool-eraser .stroke-hit{cursor:not-allowed !important}
  .workspace.panning{cursor:grabbing}

  /* ===== strokes (freehand drawings) ===== */
  .strokes{position:absolute;top:0;left:0;width:8000px;height:8000px;pointer-events:none;overflow:visible}
  .strokes .stroke-hit{fill:none;stroke:transparent;stroke-width:18;pointer-events:stroke;cursor:move}
  .strokes .stroke-line{
    fill:none;
    stroke-linecap:round;stroke-linejoin:round;
    pointer-events:none;
    filter:drop-shadow(0 0 3px currentColor);
    transition:filter .15s ease;
  }
  .strokes g.selected .stroke-line{filter:drop-shadow(0 0 6px currentColor) drop-shadow(0 0 12px currentColor)}
  .strokes g.selected .stroke-hit{stroke:rgba(255,255,255,.08)}
  .world{position:absolute;top:0;left:0;transform-origin:0 0;width:0;height:0}
  .edges{position:absolute;top:0;left:0;width:8000px;height:8000px;pointer-events:none;overflow:visible}
  .edges path{
    fill:none;stroke-width:2.2;
    pointer-events:none;
    transition:opacity .28s ease;
  }
  .edges path.gone{opacity:0}
  .edges path.stub{stroke-width:2.6}
  .edges path.preview{stroke:var(--orange);stroke-dasharray:6 4;filter:drop-shadow(0 0 4px rgba(255,157,0,.7));pointer-events:none}

  /* ===== collapse badge ===== */
  .collapse-badge{
    position:absolute;
    min-width:30px;height:24px;padding:0 9px;
    display:flex;align-items:center;justify-content:center;gap:3px;
    background:rgba(5,12,24,.95);
    border:1.5px solid currentColor;
    border-radius:14px;
    font-size:11px;font-weight:700;
    cursor:pointer;
    box-shadow:0 0 12px currentColor,inset 0 0 8px rgba(255,255,255,.06);
    z-index:4;
    user-select:none;
    animation:badge-pop .32s cubic-bezier(.34,1.56,.64,1) both;
    transition:box-shadow .15s ease;
  }
  .collapse-badge:hover{box-shadow:0 0 18px currentColor,inset 0 0 10px rgba(255,255,255,.1)}
  .collapse-badge .icon{font-size:14px;line-height:1;margin-top:-1px}
  @keyframes badge-pop{
    0%  {opacity:0;transform:translate(-50%,-50%) scale(0) rotate(-90deg)}
    60% {opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(10deg)}
    100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
  }
  /* Hover on the whole badge expands slightly — uses wrapper because animation holds transform */
  .collapse-badge-wrap{
    position:absolute;transform:translate(-50%,-50%);
    transition:transform .12s ease;
  }
  .collapse-badge-wrap:hover{transform:translate(-50%,-50%) scale(1.15)}

  /* ===== blocks ===== */
  .block{
    --bc:#00f0ff;
    --bc-rgb:0,240,255;
    position:absolute;
    padding:14px 16px;
    background:rgba(5,14,28,.9);
    border:1px solid var(--bc);border-radius:6px;
    color:var(--white);font-size:13px;line-height:1.45;
    box-shadow:0 0 14px rgba(var(--bc-rgb),.35),inset 0 0 20px rgba(var(--bc-rgb),.06);
    cursor:move;
    transform-origin:center;
    display:flex;flex-direction:column;justify-content:center;
    transition:
      opacity .32s cubic-bezier(.4,0,.2,1),
      transform .32s cubic-bezier(.4,0,.2,1),
      filter .32s ease,
      box-shadow .2s ease;
  }
  .block.hidden{
    opacity:0;
    transform:scale(.45);
    pointer-events:none;
    filter:blur(2px);
  }
  .block.selected{
    box-shadow:
      0 0 0 2px rgba(var(--bc-rgb),.9),
      0 0 24px rgba(var(--bc-rgb),.7),
      inset 0 0 22px rgba(var(--bc-rgb),.12);
  }
  .block .title{
    font-weight:700;letter-spacing:.5px;color:var(--bc);
    text-transform:uppercase;font-size:11px;margin-bottom:6px;
    /* currentColor (not the block base --bc) so a recolored word's glow
       follows its own color instead of keeping the old block color */
    text-shadow:0 0 7px currentColor;outline:none;
    text-align:center;
  }
  .block .body{color:#dcefff;outline:none;white-space:pre-wrap;word-wrap:break-word;min-height:1em;text-align:center}
  .block [contenteditable="true"]{background:rgba(var(--bc-rgb),.06);border-radius:3px;padding:2px 4px;margin:-2px -4px;cursor:text}
  .block [data-placeholder]:empty::before{
    content:attr(data-placeholder);
    opacity:.35;font-style:italic;pointer-events:none;
  }

  .port{
    position:absolute;width:12px;height:12px;
    background:var(--bg);border:2px solid var(--bc,var(--cyan));border-radius:50%;
    cursor:crosshair;transition:all .12s ease;z-index:2;
  }
  .port:hover,.port.hot{background:var(--bc,var(--cyan));box-shadow:0 0 12px var(--bc,var(--cyan)),0 0 20px rgba(var(--bc-rgb,0,240,255),.6);transform:scale(1.4)}
  .port.top{top:-7px;left:50%;transform:translateX(-50%)}
  .port.bottom{bottom:-7px;left:50%;transform:translateX(-50%)}
  .port.left{left:-7px;top:50%;transform:translateY(-50%)}
  .port.right{right:-7px;top:50%;transform:translateY(-50%)}
  .port.top:hover,.port.top.hot{transform:translateX(-50%) scale(1.4)}
  .port.bottom:hover,.port.bottom.hot{transform:translateX(-50%) scale(1.4)}
  .port.left:hover,.port.left.hot{transform:translateY(-50%) scale(1.4)}
  .port.right:hover,.port.right.hot{transform:translateY(-50%) scale(1.4)}

  .del{
    position:absolute;top:-10px;right:-10px;width:20px;height:20px;
    background:var(--bg);border:1.5px solid var(--danger);border-radius:50%;
    color:var(--danger);font-size:14px;line-height:16px;text-align:center;
    cursor:pointer;display:none;font-weight:700;z-index:3;
  }
  .block.selected .del{display:block}
  .del:hover{background:var(--danger);color:#fff;box-shadow:0 0 10px var(--danger)}

  /* Resize handles on block corners (visible when selected) */
  .resize{
    position:absolute;width:10px;height:10px;
    background:var(--bc);
    border:1.5px solid var(--bg);
    border-radius:2px;
    display:none;z-index:4;
    box-shadow:0 0 8px var(--bc);
  }
  .block.selected .resize{display:block}
  .resize.tl{top:-6px;left:-6px;cursor:nwse-resize}
  .resize.tr{top:-6px;right:-6px;cursor:nesw-resize}
  .resize.bl{bottom:-6px;left:-6px;cursor:nesw-resize}
  .resize.br{bottom:-6px;right:-6px;cursor:nwse-resize}
  .resize:hover{transform:scale(1.3);box-shadow:0 0 12px var(--bc)}

  /* ===== notes ===== */
  .note{
    --nc:#ff9d00;
    position:absolute;
    /* width:max-content lets the note size to its text even though .world is 0px wide;
       max-width caps it so long notes wrap into a readable column instead of 1 word/line */
    min-width:80px;max-width:340px;width:max-content;
    padding:7px 11px;
    color:var(--nc);font-weight:600;
    background:rgba(5,12,24,.5);
    border:1px dashed currentColor;
    border-radius:5px;cursor:move;outline:none;
    line-height:1.45;white-space:pre-wrap;word-wrap:break-word;
    /* dark drop anchors the letters for legibility; faint colored halo keeps the Tron glow */
    text-shadow:0 1px 2px rgba(0,0,0,.85),0 0 7px currentColor;
    box-shadow:0 0 14px rgba(0,0,0,.35);
    opacity:.96;
  }
  .note.selected{border-style:solid;opacity:1;box-shadow:0 0 12px currentColor,0 0 14px rgba(0,0,0,.35)}
  .note[contenteditable="true"]{cursor:text;border-style:solid;background:rgba(0,0,0,.6)}

  /* ===== energy flow (animated pulse running along edges) ===== */
  /* long lit segment + tiny gap: over the steady gradient edge below, this
     reads as a continuous beam with a bright band flowing along it.
     keyframe offset MUST equal -(dash+gap) for a seamless loop */
  /* flow-glow: continuous blurred gradient halo — uniform glow that follows
     the degradê, no periodic notches. */
  .edges path.flow-glow{
    fill:none;stroke-width:6;stroke-linecap:round;
    opacity:.22;filter:blur(2.5px);pointer-events:none;
  }
  /* flow: SOLID continuous gradient beam — no dash means it can never show a
     notch. This is the body of the beam. */
  .edges path.flow{
    fill:none;stroke-width:3.2;stroke-linecap:round;
    opacity:.95;pointer-events:none;
  }
  /* flow-spark: a single bright band sweeping along (big gaps) in SCREEN blend.
     Over the solid beam it only ADDS light, so it reads as a surge of energy
     flowing — never a dashed line. */
  .edges path.flow-spark{
    fill:none;stroke-width:3.4;stroke-linecap:round;
    stroke-dasharray:18 64;opacity:.6;
    mix-blend-mode:screen;pointer-events:none;
    animation:edge-flow 1.7s linear infinite;
  }
  @keyframes edge-flow{ from{stroke-dashoffset:0} to{stroke-dashoffset:-82} }
  @media (prefers-reduced-motion: reduce){ .edges path.flow{animation:none} }

  /* ===== presentation / focus mode ===== */
  .presentbar{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:20;
    display:flex;gap:8px;align-items:center;padding:8px 12px;
    background:rgba(5,12,24,.92);
    border:1px solid rgba(0,240,255,.45);
    border-radius:10px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 32px rgba(0,240,255,.3);
    animation:fadein .18s ease;
  }
  .presentbar .pcount{
    color:var(--cyan);font-size:13px;font-weight:700;letter-spacing:1px;
    min-width:56px;text-align:center;text-shadow:0 0 8px rgba(0,240,255,.6);
  }
  .world.present .block{
    transition:opacity .4s cubic-bezier(.4,0,.2,1),filter .4s ease,
               box-shadow .3s ease,transform .32s cubic-bezier(.4,0,.2,1);
  }
  .world.present .block:not(.focused){opacity:.12;filter:blur(1.5px) saturate(.5)}
  .world.present .block.hidden{opacity:0}
  .world.present .note{opacity:.12;transition:opacity .4s ease}
  .world.present .edges,.world.present .strokes{opacity:.22;transition:opacity .4s ease}
  .block.focused{
    box-shadow:
      0 0 0 2px rgba(var(--bc-rgb),1),
      0 0 44px rgba(var(--bc-rgb),.95),
      0 0 100px rgba(var(--bc-rgb),.5),
      inset 0 0 28px rgba(var(--bc-rgb),.18);
    z-index:5;
  }

  /* ===== connection edit handles ===== */
  .edge-handle{
    position:absolute;width:13px;height:13px;
    background:var(--bg);border:2px solid currentColor;border-radius:50%;
    box-shadow:0 0 8px currentColor;cursor:grab;z-index:6;
  }
  .edge-handle.endpoint{border-radius:3px} /* squared = an endpoint you can re-attach */
  .edge-handle:hover{box-shadow:0 0 14px currentColor;background:color-mix(in srgb,currentColor 25%,var(--bg))}
  .edge-style-btn{
    position:absolute;z-index:6;cursor:pointer;user-select:none;white-space:nowrap;
    padding:3px 8px;border-radius:12px;
    background:rgba(5,12,24,.95);border:1.5px solid currentColor;color:currentColor;
    font-size:10px;font-weight:700;letter-spacing:.5px;
    box-shadow:0 0 12px rgba(0,0,0,.5);
  }
  .edge-style-btn:hover{box-shadow:0 0 12px currentColor}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ================== ID + helpers ================== */
let _nid = 1;
const uid = () => "n" + (_nid++);

/* ---- persistence (autosave) ---- */
const LS_KEY = "canvas-tron:autosave";
const loadSaved = () => {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d || !Array.isArray(d.blocks)) return null;
    return d;
  } catch { return null; }
};
// Push the global id counter past any numeric ids found in loaded data,
// so freshly created nodes never collide with restored ones.
const bumpNidFromData = (d) => {
  if (!d) return;
  const ids = [...(d.blocks||[]),...(d.notes||[]),...(d.strokes||[]),...(d.edges||[])]
    .map(o => parseInt(String(o.id).replace(/\D/g,""),10))
    .filter(Number.isFinite);
  if (ids.length) _nid = Math.max(_nid, ...ids) + 1;
};

const DEFAULT_COLOR = "#00f0ff";
const PRESET_COLORS = [
  "#00f0ff", // cyan
  "#ff9d00", // orange
  "#00ff88", // green
  "#ff3b9a", // pink
  "#9d4bff", // purple
  "#ffdd00", // yellow
  "#ff3b5c", // red
  "#e9fbff", // white
];
const hexToRgb = (hex) => {
  const h = hex.replace("#","");
  const n = parseInt(h.length===3 ? h.split("").map(c=>c+c).join("") : h, 16);
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
};

const portWorldPos = (b, port) => {
  const w = b.w ?? 240, h = b.h ?? 80;
  switch (port) {
    case "top":    return { x: b.x + w/2, y: b.y };
    case "bottom": return { x: b.x + w/2, y: b.y + h };
    case "left":   return { x: b.x,       y: b.y + h/2 };
    case "right":  return { x: b.x + w,   y: b.y + h/2 };
  }
};
const bezierPath = (a, b) => {
  const dx = Math.abs(b.x - a.x) * 0.5 + 40;
  return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`;
};

// Orthogonal (manhattan) routing with rounded corners
const roundedPolyPath = (points, r = 12) => {
  if (!points || points.length < 2) return "";
  if (points.length === 2) return `M ${points[0].x} ${points[0].y} L ${points[1].x} ${points[1].y}`;
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i-1], cur = points[i], next = points[i+1];
    const dx1 = cur.x - prev.x, dy1 = cur.y - prev.y;
    const len1 = Math.hypot(dx1, dy1) || 1;
    const dx2 = next.x - cur.x, dy2 = next.y - cur.y;
    const len2 = Math.hypot(dx2, dy2) || 1;
    const rr = Math.min(r, len1 / 2, len2 / 2);
    const ax = cur.x - (dx1 / len1) * rr;
    const ay = cur.y - (dy1 / len1) * rr;
    const bx = cur.x + (dx2 / len2) * rr;
    const by = cur.y + (dy2 / len2) * rr;
    d += ` L ${ax} ${ay} Q ${cur.x} ${cur.y} ${bx} ${by}`;
  }
  const last = points[points.length - 1];
  d += ` L ${last.x} ${last.y}`;
  return d;
};

const orthogonalPath = (p1, dir1, p2, dir2) => {
  const OFFSET = 32;
  const s1 = { x: p1.x + dir1.x * OFFSET, y: p1.y + dir1.y * OFFSET };
  const s2 = { x: p2.x + dir2.x * OFFSET, y: p2.y + dir2.y * OFFSET };
  const h1 = dir1.x !== 0; // source port is horizontal (left/right)
  const h2 = dir2.x !== 0; // target port is horizontal (left/right)
  const pts = [p1, s1];
  if (h1 && h2) {
    // Both horizontal: bend twice at mid-x, so we always approach target port straight
    const midX = (s1.x + s2.x) / 2;
    pts.push({ x: midX, y: s1.y });
    pts.push({ x: midX, y: s2.y });
  } else if (!h1 && !h2) {
    // Both vertical: bend twice at mid-y
    const midY = (s1.y + s2.y) / 2;
    pts.push({ x: s1.x, y: midY });
    pts.push({ x: s2.x, y: midY });
  } else if (h1 && !h2) {
    // Source horizontal, target vertical: single corner
    pts.push({ x: s2.x, y: s1.y });
  } else {
    // Source vertical, target horizontal: single corner
    pts.push({ x: s1.x, y: s2.y });
  }
  pts.push(s2);
  pts.push(p2);
  return roundedPolyPath(pts, 14);
};

// Cubic bezier that leaves p1 along dir1 and arrives at p2 along dir2 (smooth "curva" style)
const dirBezier = (p1, dir1, p2, dir2) => {
  const k = Math.max(60, Math.hypot(p2.x - p1.x, p2.y - p1.y) * 0.4);
  const c1 = { x: p1.x + dir1.x * k, y: p1.y + dir1.y * k };
  const c2 = { x: p2.x + dir2.x * k, y: p2.y + dir2.y * k };
  return `M ${p1.x} ${p1.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${p2.x} ${p2.y}`;
};

// Smooth Catmull-Rom spline through an arbitrary list of points (free "curva" through waypoints)
const catmullRomPath = (pts) => {
  if (!pts || pts.length < 2) return "";
  if (pts.length === 2) return `M ${pts[0].x} ${pts[0].y} L ${pts[1].x} ${pts[1].y}`;
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i-1] || pts[i], p1 = pts[i], p2 = pts[i+1], p3 = pts[i+2] || pts[i+1];
    const c1x = p1.x + (p2.x - p0.x) / 6, c1y = p1.y + (p2.y - p0.y) / 6;
    const c2x = p2.x - (p3.x - p1.x) / 6, c2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
};

// Distance from point p to segment a-b, and the index of the closest segment in a polyline
const distToSeg = (p, a, b) => {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx*dx + dy*dy || 1;
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = a.x + t*dx, cy = a.y + t*dy;
  return Math.hypot(p.x - cx, p.y - cy);
};
const nearestSegmentIndex = (pts, p) => {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < pts.length - 1; i++) {
    const d = distToSeg(p, pts[i], pts[i+1]);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
};

// Compute an SVG path string for any stroke shape
const strokeToPath = (s) => {
  if (!s) return "";
  const t = s.type || "freehand";
  if (t === "freehand") {
    if (!s.points || s.points.length < 2) return "";
    return "M " + s.points.map(p => `${p.x} ${p.y}`).join(" L ");
  }
  if (!s.p1 || !s.p2) return "";
  const { p1, p2 } = s;
  if (t === "line") {
    return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
  }
  if (t === "rect") {
    const x = Math.min(p1.x, p2.x), y = Math.min(p1.y, p2.y);
    const w = Math.abs(p2.x - p1.x), h = Math.abs(p2.y - p1.y);
    return `M ${x} ${y} h ${w} v ${h} h ${-w} z`;
  }
  if (t === "ellipse") {
    const cx = (p1.x + p2.x) / 2;
    const cy = (p1.y + p2.y) / 2;
    const rx = Math.abs(p2.x - p1.x) / 2;
    const ry = Math.abs(p2.y - p1.y) / 2;
    if (rx < 0.5 || ry < 0.5) return "";
    return `M ${cx - rx} ${cy} A ${rx} ${ry} 0 1 0 ${cx + rx} ${cy} A ${rx} ${ry} 0 1 0 ${cx - rx} ${cy}`;
  }
  if (t === "arrow") {
    const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
    const head = Math.min(18, Math.hypot(p2.x - p1.x, p2.y - p1.y) * 0.4);
    const spread = 0.5;
    const ax = p2.x - head * Math.cos(ang - spread);
    const ay = p2.y - head * Math.sin(ang - spread);
    const bx = p2.x - head * Math.cos(ang + spread);
    const by = p2.y - head * Math.sin(ang + spread);
    return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y} M ${ax} ${ay} L ${p2.x} ${p2.y} L ${bx} ${by}`;
  }
  return "";
};

// Approximate midpoint of the bezier used for edges
const bezierMidpoint = (a, b) => {
  const dx = Math.abs(b.x - a.x) * 0.5 + 40;
  const c1x = a.x + dx, c1y = a.y;
  const c2x = b.x - dx, c2y = b.y;
  // de Casteljau at t=0.5
  const t = 0.5, it = 1 - t;
  const x = it*it*it*a.x + 3*it*it*t*c1x + 3*it*t*t*c2x + t*t*t*b.x;
  const y = it*it*it*a.y + 3*it*it*t*c1y + 3*it*t*t*c2y + t*t*t*b.y;
  return { x, y };
};

/* ================== Block ================== */
function Block({ block, selected, hidden, focused, pendingEditRef, onSelect, onStartDrag, onStartConnection, onStartResize, onDelete, onChange, onEditingBodyChange, onEditingTitleChange }) {
  const elRef = useRef(null);
  const titleRef = useRef(null);
  const bodyRef = useRef(null);
  const [editingTitle, setEditingTitle] = useState(false);
  const [editingBody, setEditingBody] = useState(false);

  // Auto-enter edit mode on the title when the block was just created
  useEffect(() => {
    if (pendingEditRef && pendingEditRef.current === block.id) {
      pendingEditRef.current = null;
      setEditingTitle(true);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Notify parent when body/title editing starts/stops, so it can show the format bar
  useEffect(() => {
    onEditingBodyChange?.(block.id, editingBody);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [editingBody]);
  useEffect(() => {
    onEditingTitleChange?.(block.id, editingTitle);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [editingTitle]);

  // When entering body edit mode, imperatively set innerHTML and focus
  useEffect(() => {
    if (editingBody && bodyRef.current) {
      bodyRef.current.innerHTML = block.body || "";
      bodyRef.current.focus();
      const range = document.createRange();
      range.selectNodeContents(bodyRef.current);
      range.collapse(false);
      const sel = getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [editingBody]);

  // Same for title
  useEffect(() => {
    if (editingTitle && titleRef.current) {
      titleRef.current.innerHTML = block.title || "";
      titleRef.current.focus();
      const range = document.createRange();
      range.selectNodeContents(titleRef.current);
      range.collapse(false);
      const sel = getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [editingTitle]);

  useEffect(() => {
    if (editingTitle && titleRef.current) {
      const t = titleRef.current; t.focus();
      const r = document.createRange(); r.selectNodeContents(t);
      const s = getSelection(); s.removeAllRanges(); s.addRange(r);
    }
  }, [editingTitle]);
  useEffect(() => {
    if (editingBody && bodyRef.current) {
      const t = bodyRef.current; t.focus();
      const r = document.createRange(); r.selectNodeContents(t);
      const s = getSelection(); s.removeAllRanges(); s.addRange(r);
    }
  }, [editingBody]);

  const color = block.color || DEFAULT_COLOR;
  return (
    <div
      ref={elRef}
      className={`block ${selected ? "selected" : ""} ${hidden ? "hidden" : ""} ${focused ? "focused" : ""}`}
      style={{
        left: block.x, top: block.y,
        width: (block.w || 240) + "px",
        minHeight: (block.h || 80) + "px",
        "--bc": color, "--bc-rgb": hexToRgb(color),
      }}
      onMouseDown={(e) => {
        if (e.target.classList.contains("port")) return;
        if (e.target.classList.contains("del")) return;
        if (e.target.isContentEditable) return;
        e.stopPropagation();
        onSelect(block.id, e.shiftKey);
        onStartDrag(e);
      }}
      onDoubleClick={(e) => {
        e.stopPropagation();
        // Use closest() so clicking on inner spans (from bold/italic/color formatting)
        // still correctly resolves to the parent title or body element
        if (e.target.closest(".title")) setEditingTitle(true);
        else setEditingBody(true);
      }}
    >
      {editingTitle ? (
        <div
          ref={titleRef}
          className="title"
          data-placeholder="TÍTULO"
          contentEditable
          suppressContentEditableWarning
          onBlur={(e) => {
            setEditingTitle(false);
            const html = e.currentTarget.innerHTML;
            const plain = e.currentTarget.textContent.trim();
            onChange(block.id, { title: plain ? html : "" });
          }}
          onKeyDown={(e) => {
            if (e.key === "Escape") { e.preventDefault(); e.currentTarget.blur(); }
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              const html = e.currentTarget.innerHTML;
              const plain = e.currentTarget.textContent.trim();
              onChange(block.id, { title: plain ? html : "" });
              setEditingTitle(false);
              setTimeout(() => setEditingBody(true), 0);
            }
          }}
        />
      ) : (
        <div
          ref={titleRef}
          className="title"
          data-placeholder="TÍTULO"
          dangerouslySetInnerHTML={{ __html: block.title || "" }}
        />
      )}
      {(editingBody || (block.body && block.body.replace(/<[^>]*>/g, "").trim() !== "")) && (
        editingBody ? (
          <div
            ref={bodyRef}
            className="body"
            contentEditable
            suppressContentEditableWarning
            onBlur={(e) => {
              setEditingBody(false);
              const html = e.currentTarget.innerHTML;
              const plain = e.currentTarget.textContent.trim();
              onChange(block.id, { body: plain ? html : "" });
            }}
            onKeyDown={(e) => {
              if (e.key === "Escape") { e.preventDefault(); e.currentTarget.blur(); }
            }}
          />
        ) : (
          <div
            ref={bodyRef}
            className="body"
            dangerouslySetInnerHTML={{ __html: block.body || "" }}
          />
        )
      )}
      <div className="del" onMouseDown={(e) => { e.stopPropagation(); onDelete(block.id); }}>×</div>
      {["top","right","bottom","left"].map(p => (
        <div key={p} className={`port ${p}`} data-port={p}
          onMouseDown={(e) => { e.stopPropagation(); onStartConnection(block.id, p, e); }} />
      ))}
      {["tl","tr","bl","br"].map(c => (
        <div key={c} className={`resize ${c}`}
          onMouseDown={(e) => { e.stopPropagation(); onSelect(block.id, false); onStartResize(block.id, c, e); }} />
      ))}
    </div>
  );
}

/* ================== Note ================== */
function Note({ note, selected, onSelect, onStartDrag, onChange, onEraser, onEditingChange }) {
  const ref = useRef(null);
  const [editing, setEditing] = useState(false);

  // Tell the parent when this note enters/leaves edit mode, so it can show the
  // rich-text format bar (bold/italic/underline/size/color) — same bar the blocks use.
  useEffect(() => {
    onEditingChange?.(note.id, editing);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [editing]);

  // On entering edit mode, load the stored HTML imperatively and select it all
  // so the user can immediately retype or apply formatting to the whole note.
  useEffect(() => {
    if (editing && ref.current) {
      ref.current.innerHTML = note.text || "";
      ref.current.focus();
      const r = document.createRange(); r.selectNodeContents(ref.current);
      const s = getSelection(); s.removeAllRanges(); s.addRange(r);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [editing]);

  const color = note.color || "#ff9d00";
  const common = {
    ref,
    className: `note ${selected ? "selected" : ""}`,
    style: { left: note.x, top: note.y, "--nc": color, fontSize: (note.fontSize || 14) + "px" },
  };

  // While editing: a plain contentEditable surface (HTML set imperatively above).
  if (editing) {
    return (
      <div
        {...common}
        contentEditable
        suppressContentEditableWarning
        onBlur={(e) => {
          setEditing(false);
          const html = e.currentTarget.innerHTML;
          const plain = e.currentTarget.textContent.trim();
          onChange(note.id, { text: plain ? html : "" });
        }}
        onKeyDown={(e) => {
          if (e.key === "Escape") { e.preventDefault(); e.currentTarget.blur(); }
        }}
      />
    );
  }

  // Display mode: render the stored HTML; click to select/drag, double-click to edit.
  return (
    <div
      {...common}
      onMouseDown={(e) => {
        e.stopPropagation();
        if (onEraser && onEraser(note.id)) return;
        onSelect(note.id, e.shiftKey);
        onStartDrag(e);
      }}
      onDoubleClick={(e) => { e.stopPropagation(); setEditing(true); }}
      dangerouslySetInnerHTML={{ __html: note.text || "" }}
    />
  );
}

  const blocksById = useMemo(() => {
    const m = new Map(); blocks.forEach(b => m.set(b.id, b)); return m;
  }, [blocks]);

  /* ----- hidden blocks (from collapsed edges) ----- */
  // Subtree collapse: each collapsed edge literally hides the subtree on the
  // "far" side of the clicked port (no multi-parent protection — if the user
  // collapsed it, it goes away).
  const addDescendants = useCallback((startId, out) => {
    const q = [startId];
    while (q.length) {
      const cur = q.shift();
      if (out.has(cur)) continue;
      out.add(cur);
      edges.forEach(e => { if (e.from.id === cur) q.push(e.to.id); });
    }
  }, [edges]);
  const addAncestors = useCallback((startId, out) => {
    const q = [startId];
    while (q.length) {
      const cur = q.shift();
      if (out.has(cur)) continue;
      out.add(cur);
      edges.forEach(e => { if (e.to.id === cur) q.push(e.from.id); });
    }
  }, [edges]);

  const hiddenBlockIds = useMemo(() => {
    const hidden = new Set();
    // "Near" blocks = the ones whose port was clicked; they must always stay visible.
    const nearIds = new Set();
    edges.forEach(e => {
      if (!e.collapsed) return;
      if (e.collapseDir === "backward") nearIds.add(e.to.id);
      else nearIds.add(e.from.id);
    });
    edges.forEach(e => {
      if (!e.collapsed) return;
      if (e.collapseDir === "backward") addAncestors(e.from.id, hidden);
      else addDescendants(e.to.id, hidden);
    });
    nearIds.forEach(id => hidden.delete(id));
    return hidden;
  }, [blocks, edges, addDescendants, addAncestors]);

  /* ----- count of blocks hidden by a single collapsed edge ----- */
  const collapsedCount = useCallback((e) => {
    const out = new Set();
    if (e.collapseDir === "backward") {
      addAncestors(e.from.id, out);
      out.delete(e.to.id);
    } else {
      addDescendants(e.to.id, out);
      out.delete(e.from.id);
    }
    return out.size;
  }, [addDescendants, addAncestors]);

  const toggleEdgeCollapse = useCallback((edgeId) => {
