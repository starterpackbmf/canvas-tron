    document.execCommand("foreColor", false, color);
  }, []);
  const applyFontSize = useCallback((px) => {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (range.collapsed) return;
    const span = document.createElement("span");
    span.style.fontSize = px + "px";
    try {
      range.surroundContents(span);
    } catch {
      const contents = range.extractContents();
      span.appendChild(contents);
      range.insertNode(span);
    }
    sel.removeAllRanges();
  }, []);

  const createNote = useCallback((x, y, color, fontSize) => {
    const n = {
      id: uid(), x, y, text: "Anotação…",
      color: color || "#ff9d00",
      fontSize: fontSize || 14,
    };
    setNotes(p => [...p, n]);
    selectOne(n.id);
    return n;
  }, [selectOne]);

  const updateStroke = useCallback((id, patch) => {
    setStrokes(p => p.map(s => s.id === id ? { ...s, ...patch } : s));
  }, []);

  /* ----- update ----- */
  const updateBlock = useCallback((id, patch) => {
    setBlocks(p => p.map(b => b.id === id ? { ...b, ...patch } : b));
  }, []);
  const updateNote = useCallback((id, patch) => {
    setNotes(p => p.map(n => n.id === id ? { ...n, ...patch } : n));
  }, []);

  /* ----- delete ----- */
  const deleteSelection = useCallback(() => {
    if (selectedEdge) {
      setEdges(p => p.filter(e => e.id !== selectedEdge));
      setSelectedEdge(null);
      return;
    }
    if (selection.size === 0) return;
    setBlocks(p => p.filter(b => !selection.has(b.id)));
    setNotes(p => p.filter(n => !selection.has(n.id)));
    setStrokes(p => p.filter(s => !selection.has(s.id)));
    setEdges(p => p.filter(e => !selection.has(e.from.id) && !selection.has(e.to.id)));
    setSelection(new Set());
  }, [selection, selectedEdge]);

  const deleteBlock = useCallback((id) => {
    setBlocks(p => p.filter(b => b.id !== id));
    setEdges(p => p.filter(e => e.from.id !== id && e.to.id !== id));
    setSelection(prev => { const n = new Set(prev); n.delete(id); return n; });
  }, []);

  /* ----- drag ----- */
  const startDrag = useCallback((e, id) => {
    // Build drag set from current selection (including the clicked id)
    setSelection(prevSel => {
      const sel = prevSel.has(id) ? prevSel : new Set([id]);
      const items = [];
      blocks.forEach(b => { if (sel.has(b.id)) items.push({ kind:"block", id:b.id, startX:b.x, startY:b.y }); });
      notes.forEach(n => { if (sel.has(n.id)) items.push({ kind:"note",  id:n.id, startX:n.x, startY:n.y }); });
      strokes.forEach(s => { if (sel.has(s.id)) items.push({ kind:"stroke", id:s.id, startX:s.x, startY:s.y }); });
      dragRef.current = { startMouse:{ x:e.clientX, y:e.clientY }, items };
      return sel;
    });
  }, [blocks, notes, strokes]);

  /* ----- connection ----- */
  const startConnection = useCallback((blockId, port, e) => {
    const b = blocksById.get(blockId);
    if (!b) return;
    const from = portWorldPos(b, port);
    connectRef.current = {
      fromId: blockId,
      fromPort: port,
      from,
      startScreen: { x: e.clientX, y: e.clientY },
      moved: false,
    };
    // Don't show preview yet — wait until mouse actually moves
  }, [blocksById]);

  const togglePortCollapse = useCallback((blockId, port) => {
    setEdges(p => p.map(e => {
      // Clicked on the source port → hide what's downstream (forward)
      if (e.from.id === blockId && e.from.port === port) {
        return { ...e, collapsed: !e.collapsed, collapseDir: "forward" };
      }
      // Clicked on the target port → hide what's upstream (backward)
      if (e.to.id === blockId && e.to.port === port) {
        return { ...e, collapsed: !e.collapsed, collapseDir: "backward" };
      }
      return e;
    }));
  }, []);

  /* ----- connection path editing ----- */
  // Cycle the routing style of one connection: ortogonal → curva → reta
  const cycleEdgeStyle = useCallback((id) => {
    const order = ["ortho", "curved", "straight"];
    setEdges(p => p.map(e => e.id === id
      ? { ...e, style: order[(order.indexOf(e.style || "ortho") + 1) % order.length] }
      : e));
  }, []);
  // Remove one waypoint (double-click a bend handle); empty list → back to auto-route
  const removeWaypoint = useCallback((id, index) => {
    setEdges(p => p.map(e => {
      if (e.id !== id) return e;
      const wps = (e.waypoints || []).slice();
      wps.splice(index, 1);
      return { ...e, waypoints: wps };
    }));
  }, []);

  /* ----- undo / redo (snapshot history) ----- */
  // Only the document content is tracked (not pan/zoom or selection).
  const applySnapshot = useCallback((snap) => {
    let d; try { d = JSON.parse(snap); } catch { return; }
    setBlocks(d.blocks || []);
    setNotes(d.notes || []);
    setStrokes(d.strokes || []);
    setEdges(d.edges || []);
    setSelection(new Set());
    setSelectedEdge(null);
  }, []);

  // Record content changes into history, debounced so a whole drag/edit
  // collapses into a single undo step.
  useEffect(() => {
    const snap = JSON.stringify({ blocks, notes, strokes, edges });
    pendingSnapRef.current = snap;
    if (lastSnapRef.current === null) { lastSnapRef.current = snap; return; }
    if (restoringRef.current) { restoringRef.current = false; lastSnapRef.current = snap; return; }
    if (snap === lastSnapRef.current) return;
    clearTimeout(histTimerRef.current);
    histTimerRef.current = setTimeout(() => {
      if (pendingSnapRef.current === lastSnapRef.current) return;
      const h = histRef.current;
      h.past.push(lastSnapRef.current);
      if (h.past.length > 120) h.past.shift();
      h.future = [];
      lastSnapRef.current = pendingSnapRef.current;
    }, 350);
  }, [blocks, notes, strokes, edges]);

  const undo = useCallback(() => {
    clearTimeout(histTimerRef.current);
    const h = histRef.current;
    // flush any not-yet-committed change so it can be redone
    if (pendingSnapRef.current && pendingSnapRef.current !== lastSnapRef.current) {
      h.past.push(lastSnapRef.current);
      lastSnapRef.current = pendingSnapRef.current;
    }
    if (!h.past.length) return;
    const prev = h.past.pop();
    h.future.push(lastSnapRef.current);
    restoringRef.current = true;
    lastSnapRef.current = prev;
    applySnapshot(prev);
  }, [applySnapshot]);

  const redo = useCallback(() => {
    clearTimeout(histTimerRef.current);
    const h = histRef.current;
    if (!h.future.length) return;
    const next = h.future.pop();
    h.past.push(lastSnapRef.current);
    restoringRef.current = true;
    lastSnapRef.current = next;
    applySnapshot(next);
  }, [applySnapshot]);

  /* ----- duplicate selection (Ctrl+D) ----- */
  const duplicateSelection = useCallback(() => {
    if (selection.size === 0) return;
    const OFF = 32;
    const idMap = new Map();
    const newBlocks = [], newNotes = [], newStrokes = [], newSel = new Set();
    blocks.forEach(b => {
      if (!selection.has(b.id)) return;
      const nid = uid(); idMap.set(b.id, nid);
      newBlocks.push({ ...b, id: nid, x: b.x + OFF, y: b.y + OFF }); newSel.add(nid);
    });
    notes.forEach(n => {
      if (!selection.has(n.id)) return;
      const nid = uid();
      newNotes.push({ ...n, id: nid, x: n.x + OFF, y: n.y + OFF }); newSel.add(nid);
    });
    strokes.forEach(s => {
      if (!selection.has(s.id)) return;
      const nid = uid();
      newStrokes.push({ ...s, id: nid, x: (s.x || 0) + OFF, y: (s.y || 0) + OFF }); newSel.add(nid);
    });
    // Re-create edges that live entirely inside the duplicated set
    const newEdges = edges
      .filter(e => idMap.has(e.from.id) && idMap.has(e.to.id))
      .map(e => ({ ...e, id: uid(),
        from: { ...e.from, id: idMap.get(e.from.id) },
        to:   { ...e.to,   id: idMap.get(e.to.id) } }));
    if (newBlocks.length)  setBlocks(p => [...p, ...newBlocks]);
    if (newNotes.length)   setNotes(p => [...p, ...newNotes]);
    if (newStrokes.length) setStrokes(p => [...p, ...newStrokes]);
    if (newEdges.length)   setEdges(p => [...p, ...newEdges]);
    if (newSel.size) { setSelection(newSel); setSelectedEdge(null); }
  }, [blocks, notes, strokes, edges, selection]);

  /* ----- autosave to localStorage (debounced) ----- */
  useEffect(() => {
    const t = setTimeout(() => {
      try { localStorage.setItem(LS_KEY, JSON.stringify({ blocks, notes, strokes, edges, view, flow })); } catch {}
    }, 500);
    return () => clearTimeout(t);
  }, [blocks, notes, strokes, edges, view, flow]);

  /* ----- smooth camera tween + center-on-block (used by presentation) ----- */
  const tweenView = useCallback((target, dur = 440) => {
    cancelAnimationFrame(tweenRef.current);
    const start = { ...viewRef.current };
    const t0 = performance.now();
    const step = (now) => {
      const k = Math.min(1, (now - t0) / dur);
      const e = 1 - Math.pow(1 - k, 3); // easeOutCubic
      setView({
        x: start.x + (target.x - start.x) * e,
        y: start.y + (target.y - start.y) * e,
        scale: start.scale + (target.scale - start.scale) * e,
      });
      if (k < 1) tweenRef.current = requestAnimationFrame(step);
    };
    tweenRef.current = requestAnimationFrame(step);
  }, []);
  const centerOnBlock = useCallback((b, scale) => {
    if (!b) return;
    const w = b.w || 240, h = b.h || 80;
    const sc = scale ?? Math.min(1.2, Math.max(0.9, viewRef.current.scale));
    const cx = b.x + w / 2, cy = b.y + h / 2;
    tweenView({ scale: sc, x: window.innerWidth / 2 - cx * sc, y: window.innerHeight / 2 - cy * sc });
  }, [tweenView]);

  /* ----- presentation / focus mode ----- */
  // Visible blocks in reading order (top-to-bottom, then left-to-right by row)
  const presentOrder = useMemo(() =>
    blocks.filter(b => !hiddenBlockIds.has(b.id)).slice().sort((a, b) => {
      const ra = Math.round(a.y / 60), rb = Math.round(b.y / 60);
      return ra !== rb ? ra - rb : a.x - b.x;
    }), [blocks, hiddenBlockIds]);
  useEffect(() => { presentOrderRef.current = presentOrder; }, [presentOrder]);

  const goToPresent = useCallback((idx) => {
    const ord = presentOrderRef.current;
    if (!ord.length) return;
    const i = ((idx % ord.length) + ord.length) % ord.length;
    setFocusIdx(i);
    setFocusId(ord[i].id);
    centerOnBlock(ord[i], 1.2);
  }, [centerOnBlock]);
  const enterPresent = useCallback(() => {
    const ord = presentOrderRef.current;
    if (!ord.length) return;
    let i = 0;
    const selId = [...selection][0];
    if (selId) { const k = ord.findIndex(b => b.id === selId); if (k >= 0) i = k; }
    clearSelection();
    setPresent(true);
    setFocusIdx(i);
    setFocusId(ord[i].id);
    centerOnBlock(ord[i], 1.2);
  }, [selection, centerOnBlock, clearSelection]);
  const exitPresent = useCallback(() => { setPresent(false); setFocusId(null); }, []);

  /* ----- mouse / keyboard global ----- */
  useEffect(() => {
    const onMove = (e) => {
      if (resizeRef.current) {
        const r = resizeRef.current;
        const dx = (e.clientX - r.startMouse.x) / view.scale;
        const dy = (e.clientY - r.startMouse.y) / view.scale;
        const MIN_W = 120, MIN_H = 60;
        let { x, y, w, h } = r.startBlock;
        if (r.corner.includes("r")) w = Math.max(MIN_W, r.startBlock.w + dx);
        if (r.corner.includes("l")) {
          const newW = Math.max(MIN_W, r.startBlock.w - dx);
          x = r.startBlock.x + (r.startBlock.w - newW);
          w = newW;
        }
        if (r.corner.includes("b")) h = Math.max(MIN_H, r.startBlock.h + dy);
        if (r.corner.includes("t")) {
          const newH = Math.max(MIN_H, r.startBlock.h - dy);
          y = r.startBlock.y + (r.startBlock.h - newH);
          h = newH;
        }
        setBlocks(prev => prev.map(bb => bb.id === r.id ? { ...bb, x, y, w, h } : bb));
        return;
      }
      if (edgeEditRef.current) {
        const ed = edgeEditRef.current;
        const wp = screenToWorld(e.clientX, e.clientY);
        // First real movement on a line press: insert a bend (waypoint) at that segment
        if (ed.kind === "press") {
          const dx = e.clientX - ed.startScreen.x, dy = e.clientY - ed.startScreen.y;
          if (dx*dx + dy*dy < 16) return; // < 4px → treat as click (select), not bend
          const segIdx = nearestSegmentIndex(ed.pts, ed.wp);
          setEdges(prev => prev.map(x => {
            if (x.id !== ed.edgeId) return x;
            const wps = (x.waypoints || []).slice();
            wps.splice(segIdx, 0, wp);
            return { ...x, waypoints: wps };
          }));
          ed.kind = "waypoint";
          ed.index = segIdx;
          setSelectedEdge(ed.edgeId);
          return;
        }
        if (ed.kind === "waypoint") {
          setEdges(prev => prev.map(x => {
            if (x.id !== ed.edgeId) return x;
            const wps = (x.waypoints || []).slice();
            wps[ed.index] = wp;
            return { ...x, waypoints: wps };
          }));
          return;
        }
        if (ed.kind === "endpoint") {
          ed.moved = true;
          setPreview({ from: ed.fixed, to: wp });
          document.querySelectorAll(".port.hot").forEach(pp => pp.classList.remove("hot"));
          const el = document.elementFromPoint(e.clientX, e.clientY);
          if (el && el.classList.contains("port")) el.classList.add("hot");
          return;
        }
      }
      if (connectRef.current) {
        const c = connectRef.current;
        // Threshold: don't start the connection drag until the mouse has really moved.
        // Below that, treat the interaction as a click-to-collapse.
        if (!c.moved) {
          const dx = e.clientX - c.startScreen.x;
          const dy = e.clientY - c.startScreen.y;
          if (dx*dx + dy*dy < 16) return; // < 4px movement
          c.moved = true;
          setPreview({ from: c.from, to: c.from });
        }
        const to = screenToWorld(e.clientX, e.clientY);
        setPreview(p => p ? { ...p, to } : p);
        document.querySelectorAll(".port.hot").forEach(p => p.classList.remove("hot"));
        const el = document.elementFromPoint(e.clientX, e.clientY);
        if (el && el.classList.contains("port")) el.classList.add("hot");
        return;
      }
      if (dragRef.current) {
        const d = dragRef.current;
        const dx = (e.clientX - d.startMouse.x) / view.scale;
        const dy = (e.clientY - d.startMouse.y) / view.scale;
        // Apply movement
        setBlocks(prev => prev.map(b => {
          const it = d.items.find(i => i.kind === "block" && i.id === b.id);
          return it ? { ...b, x: it.startX + dx, y: it.startY + dy } : b;
        }));
        setNotes(prev => prev.map(n => {
          const it = d.items.find(i => i.kind === "note" && i.id === n.id);
          return it ? { ...n, x: it.startX + dx, y: it.startY + dy } : n;
        }));
        setStrokes(prev => prev.map(s => {
          const it = d.items.find(i => i.kind === "stroke" && i.id === s.id);
          return it ? { ...s, x: it.startX + dx, y: it.startY + dy } : s;
        }));
        return;
      }
      if (panRef.current) {
        setView(v => ({ ...v, x: v.x + e.movementX, y: v.y + e.movementY }));
        return;
      }
      if (drawing) {
        const wp = screenToWorld(e.clientX, e.clientY);
        setDrawing(d => {
          if (!d) return d;
          if (d.type === "freehand") {
            const last = d.points[d.points.length - 1];
            const dx = wp.x - last.x, dy = wp.y - last.y;
            if (dx*dx + dy*dy < 4) return d;
            return { ...d, points: [...d.points, wp] };
          }
          // Shift-constrained (square/circle/straight line) when Shift is held
          let p2 = wp;
          if (e.shiftKey && (d.type === "rect" || d.type === "ellipse")) {
            const dx = wp.x - d.p1.x, dy = wp.y - d.p1.y;
            const m = Math.min(Math.abs(dx), Math.abs(dy));
            p2 = { x: d.p1.x + Math.sign(dx) * m, y: d.p1.y + Math.sign(dy) * m };
          } else if (e.shiftKey && (d.type === "line" || d.type === "arrow")) {
            // Snap to 0/45/90 degrees
            const dx = wp.x - d.p1.x, dy = wp.y - d.p1.y;
            const ang = Math.round(Math.atan2(dy, dx) / (Math.PI/4)) * (Math.PI/4);
            const len = Math.hypot(dx, dy);
            p2 = { x: d.p1.x + Math.cos(ang)*len, y: d.p1.y + Math.sin(ang)*len };
          }
          return { ...d, p2 };
        });
      }
    };
    const onUp = (e) => {
      if (edgeEditRef.current) {
        const ed = edgeEditRef.current;
        edgeEditRef.current = null;
        if (ed.kind === "press") {
          // No drag happened → it was a click: just select the connection
          clearSelection();
          setSelectedEdge(ed.edgeId);
        } else if (ed.kind === "endpoint") {
          setPreview(null);
          document.querySelectorAll(".port.hot").forEach(pp => pp.classList.remove("hot"));
          if (ed.moved) {
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && el.classList.contains("port")) {
              const blockEl = el.parentElement;
              const all = Array.from(document.querySelectorAll(".block"));
              const idx = all.indexOf(blockEl);
              if (idx >= 0) {
                const tb = blocks[idx];
                const port = el.dataset.port;
                // Re-attach this end, as long as it doesn't collapse the edge to a single block
                if (tb && !hiddenBlockIds.has(tb.id)) {
                  setEdges(prev => prev.map(x => {
                    if (x.id !== ed.edgeId) return x;
                    const other = ed.end === "from" ? x.to.id : x.from.id;
                    if (tb.id === other) return x; // can't connect a block to itself
                    return { ...x, [ed.end]: { id: tb.id, port } };
                  }));
                }
              }
            }
          }
        }
        return;
      }
      if (connectRef.current) {
        const c = connectRef.current;
        // Click (no drag) → toggle collapse on all edges touching this port
        if (!c.moved) {
          togglePortCollapse(c.fromId, c.fromPort);
          connectRef.current = null;
          setPreview(null);
          document.querySelectorAll(".port.hot").forEach(p => p.classList.remove("hot"));
          return;
        }
        // Drag → resolve drop target and create an edge
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const portEl = (el && el.classList.contains("port")) ? el : null;
        const { fromId, fromPort } = connectRef.current;
        if (portEl) {
          const blockEl = portEl.parentElement;
          const all = Array.from(document.querySelectorAll(".block"));
          const idx = all.indexOf(blockEl);
          if (idx >= 0) {
            const toBlock = blocks[idx];
            const toPort = portEl.dataset.port;
            if (toBlock && toBlock.id !== fromId && !hiddenBlockIds.has(toBlock.id)) {
              setEdges(p => [...p, { id: uid(), from:{id:fromId,port:fromPort}, to:{id:toBlock.id,port:toPort} }]);
            }
          }
        } else {
          // Dropped on empty space — create a new block at that position and connect to it
          const wp = screenToWorld(e.clientX, e.clientY);
          // Map source port to opposite port on new block
          const OPP = { top:"bottom", bottom:"top", left:"right", right:"left" };
          const toPort = OPP[fromPort] || "left";
          const W = 240, H = 80;
          // Position new block so the receiving port lands roughly at the cursor
          let nx = wp.x, ny = wp.y;
          if (toPort === "left")   { nx = wp.x;          ny = wp.y - H/2; }
          if (toPort === "right")  { nx = wp.x - W;      ny = wp.y - H/2; }
          if (toPort === "top")    { nx = wp.x - W/2;    ny = wp.y;       }
          if (toPort === "bottom") { nx = wp.x - W/2;    ny = wp.y - H;   }
          // Inherit color from the source block so the new node visually belongs to the same flow
          const sourceBlock = blocks.find(b => b.id === fromId);
          const newId = uid();
          const newBlock = {
            id: newId, x: nx, y: ny, w: W, h: H,
            title: "", body: "",
            color: (sourceBlock && sourceBlock.color) || DEFAULT_COLOR,
          };
          pendingEditRef.current = newId;
          setBlocks(p => [...p, newBlock]);
          setEdges(p => [...p, { id: uid(), from:{id:fromId,port:fromPort}, to:{id:newId,port:toPort} }]);
          // Select the new block so user can immediately edit it
          setSelection(new Set([newId]));
        }
        setPreview(null);
        connectRef.current = null;
        document.querySelectorAll(".port.hot").forEach(p => p.classList.remove("hot"));
      }
      dragRef.current = null;
      resizeRef.current = null;
      panRef.current = false;
      if (wsRef.current) wsRef.current.classList.remove("panning");
      if (drawing) {
        // Commit the stroke if it has enough data
        let ok = false;
        if (drawing.type === "freehand") {
          ok = drawing.points && drawing.points.length >= 2;
        } else {
          const dx = drawing.p2.x - drawing.p1.x;
          const dy = drawing.p2.y - drawing.p1.y;
          ok = Math.hypot(dx, dy) > 3;
        }
        if (ok) setStrokes(p => [...p, drawing]);
        setDrawing(null);
      }
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, [view.scale, blocks, hiddenBlockIds, togglePortCollapse, drawing, screenToWorld, drawShape, clearSelection]);

  /* ----- keyboard ----- */
  useEffect(() => {
    const onKey = (e) => {
      if (document.activeElement && document.activeElement.isContentEditable) return;
      const mod = e.ctrlKey || e.metaKey;
      if (mod) {
        const k = e.key.toLowerCase();
        if (k === "z")      { e.preventDefault(); e.shiftKey ? redo() : undo(); }
        else if (k === "y") { e.preventDefault(); redo(); }
        else if (k === "d") { e.preventDefault(); duplicateSelection(); }
        return; // never let a Ctrl/Cmd combo fall through to tool shortcuts
      }
      if (present) {
        if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") { e.preventDefault(); goToPresent(focusIdxRef.current + 1); }
        else if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); goToPresent(focusIdxRef.current - 1); }
        else if (e.key === "Escape") exitPresent();
        return;
      }
      if (e.key === " ") { spaceRef.current = true; e.preventDefault(); }
      if (e.key === "Delete" || e.key === "Backspace") deleteSelection();
      if (e.key === "b" || e.key === "B") setTool("block");
      if (e.key === "n" || e.key === "N") { setTool("draw"); setDrawShape("text"); }
      if (e.key === "d" || e.key === "D") { setTool("draw"); setDrawShape("freehand"); }
      if (e.key === "v" || e.key === "V") setTool("select");
      if (e.key === "p" || e.key === "P") enterPresent();
      if (e.key === "Escape") { clearSelection(); setTool("select"); }
    };
    const onKeyUp = (e) => { if (e.key === " ") spaceRef.current = false; };
    window.addEventListener("keydown", onKey);
    window.addEventListener("keyup", onKeyUp);
    return () => {
      window.removeEventListener("keydown", onKey);
      window.removeEventListener("keyup", onKeyUp);
    };
  }, [deleteSelection, clearSelection, undo, redo, duplicateSelection, present, goToPresent, enterPresent, exitPresent]);

  /* ----- wheel zoom ----- */
  const onWheel = useCallback((e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.2, Math.min(3, view.scale * delta));
    const wp = screenToWorld(e.clientX, e.clientY);
    setView({
      scale: newScale,
      x: e.clientX - wp.x * newScale,
      y: e.clientY - wp.y * newScale,
    });
  }, [view, screenToWorld]);

  /* ----- workspace click ----- */
  const onWorkspaceDown = (e) => {
    // Only react if clicking the workspace itself, not a child
    if (e.target !== wsRef.current && !e.target.classList.contains("world") && e.target.tagName !== "svg") return;
    // Blur any active editing so clicking outside always exits edit mode
    if (document.activeElement && document.activeElement.isContentEditable) {
      document.activeElement.blur();
    }
    const wp = screenToWorld(e.clientX, e.clientY);
    if (tool === "block") { createBlock(wp.x, wp.y); setTool("select"); return; }
    if (tool === "draw") {
      clearSelection();
      if (drawShape === "eraser") {
        e.preventDefault();
        return;
      }
      if (drawShape === "text") {
        createNote(wp.x, wp.y, drawColor, drawFontSize);
        e.preventDefault();
        return;
      }
      // Start a new stroke
      const base = { id: uid(), type: drawShape, x: 0, y: 0, color: drawColor, width: drawWidth };
      if (drawShape === "freehand") {
        setDrawing({ ...base, points: [{ x: wp.x, y: wp.y }] });
      } else {
        setDrawing({ ...base, p1: { x: wp.x, y: wp.y }, p2: { x: wp.x, y: wp.y } });
      }
      e.preventDefault();
      return;
    }
    // Default: clicking empty workspace always pans the canvas
    clearSelection();
    panRef.current = true;
    wsRef.current.classList.add("panning");
    e.preventDefault();
  };

  /* ----- fit/reset/clear ----- */
  const fitAll = () => {
    const items = [...blocks.filter(b => !hiddenBlockIds.has(b.id)), ...notes];
    // Include strokes' extents
    const strokeBounds = strokes.flatMap(s =>
      (s.points || []).map(p => ({ x: p.x + (s.x||0), y: p.y + (s.y||0), w: 0, h: 0 }))
    );
    const all = [...items, ...strokeBounds];
    if (!all.length) { setView({ x:0, y:0, scale:1 }); return; }
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    all.forEach(o => {
      const w = o.w ?? 0, h = o.h ?? 0;
      minX = Math.min(minX, o.x); minY = Math.min(minY, o.y);
      maxX = Math.max(maxX, o.x + w); maxY = Math.max(maxY, o.y + h);
    });
    const pad = 80;
    const cw = window.innerWidth - 160, ch = window.innerHeight - 160;
    const scale = Math.min(cw/(maxX-minX+pad*2), ch/(maxY-minY+pad*2), 1.5);
    setView({
      scale,
      x: 80 - minX*scale + (cw-(maxX-minX)*scale)/2,
      y: 80 - minY*scale + (ch-(maxY-minY)*scale)/2,
    });
  };

  /* ----- export PNG (rasterize the whole map) ----- */
  const exportPNG = () => {
    const h2c = window.html2canvas;
    if (!h2c) { alert("A biblioteca de imagem ainda está carregando — tente de novo em instantes."); return; }
    const ws = wsRef.current;
    if (!ws) return;
    fitAll(); // frame everything first so the capture includes the full map
    setTimeout(() => {
      h2c(ws, { backgroundColor: "#030612", scale: 2, logging: false, useCORS: true })
        .then(canvas => {
          const a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "canvas-tron.png";
          a.click();
        })
        .catch(err => { console.error(err); alert("Falha ao exportar PNG: " + err.message); });
    }, 200);
  };

  /* ----- export / import ----- */
  const exportJSON = () => {
    const data = { blocks, notes, strokes, edges, view };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "canvas-tron.json";
    a.click();
  };
  const importJSON = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        setBlocks(data.blocks || []);
        setNotes(data.notes || []);
        setStrokes(data.strokes || []);
        setEdges(data.edges || []);
        if (data.view) setView(data.view);
        // bump id counter
        const ids = [...(data.blocks||[]),...(data.notes||[]),...(data.strokes||[])].map(o=>parseInt(String(o.id).replace(/\D/g,""),10));
        _nid = Math.max(_nid, ...ids.filter(Number.isFinite)) + 1;
      } catch { alert("Arquivo inválido"); }
    };
    r.readAsText(f);
    e.target.value = "";
  };
  const clearAll = () => {
    if (!confirm("Limpar todo o canvas?")) return;
    setBlocks([]); setNotes([]); setStrokes([]); setEdges([]); clearSelection();
  };

  /* ----- Markdown → mind map ----- */
  const mdInlineToHtml = (text) => {
    // Very light inline markdown support; escape first to avoid injection
    const esc = text
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return esc
      .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
      .replace(/__(.+?)__/g,     "<b>$1</b>")
      .replace(/(^|[^*])\*([^*]+)\*/g, "$1<i>$2</i>")
      .replace(/(^|[^_])_([^_]+)_/g,   "$1<i>$2</i>")
      .replace(/`(.+?)`/g, "<code>$1</code>")
      .replace(/\n/g, "<br>");
  };

  const parseMarkdownTree = (text) => {
    const lines = text.split(/\r?\n/);
    const rootNode = { level: 0, title: "Mapa Mental", body: "", children: [] };
    const stack = [rootNode];
    let pending = [];
    const flush = () => {
      if (!pending.length) return;
      const cur = stack[stack.length - 1];
      const extra = pending.join("\n").trim();
      if (extra) cur.body = (cur.body ? cur.body + "\n" : "") + extra;
      pending = [];
    };
    for (const line of lines) {
      const m = line.match(/^(#{1,6})\s+(.+?)\s*$/);
      if (m) {
        flush();
        const level = m[1].length;
        const title = m[2];
        while (stack.length > 1 && stack[stack.length - 1].level >= level) stack.pop();
        const parent = stack[stack.length - 1];
        const node = { level, title, body: "", children: [] };
        parent.children.push(node);
        stack.push(node);
      } else {
        pending.push(line);
      }
    }
    flush();
    // If there's a single top-level heading, promote it to be the actual root
    if (rootNode.children.length === 1) return rootNode.children[0];
    return rootNode;
  };

  const buildMindMapFromTree = (root, originX, originY) => {
    const newBlocks = [];
    const newEdges = [];
    const COL_W = 360;
    const ROW_H = 140;
    const B_W = 260;
    const B_H = 90;

    // Row assignment via in-order traversal (leaves consume sequential rows;
    // parents center themselves between their first and last child rows)
    let rowCursor = 0;
    const assignLayout = (node, depth, color) => {
      node._depth = depth;
      node._color = color;
      if (!node.children || node.children.length === 0) {
        node._row = rowCursor++;
      } else {
        const firstRow = rowCursor;
        node.children.forEach((child, i) => {
          // Top-level children of synthetic root pick a distinct preset;
          // everyone else inherits parent color
          const childColor = (depth === 0 && root.level === 0)
            ? PRESET_COLORS[i % PRESET_COLORS.length]
            : (depth === 0 ? color : color);
          assignLayout(child, depth + 1, childColor);
        });
        const lastRow = rowCursor - 1;
        node._row = (firstRow + lastRow) / 2;
      }
    };
    assignLayout(root, 0, "#00f0ff");

    const idMap = new Map();
    const addBlocks = (node) => {
      const id = uid();
      idMap.set(node, id);
      newBlocks.push({
        id,
        x: originX + node._depth * COL_W,
        y: originY + node._row   * ROW_H,
        w: B_W, h: B_H,
        color: node._color,
        title: node.title,
        body: node.body ? mdInlineToHtml(node.body) : "",
      });
      if (node.children) {
        node.children.forEach(child => {
          addBlocks(child);
          newEdges.push({
            id: uid(),
            from: { id: idMap.get(node),  port: "right" },
            to:   { id: idMap.get(child), port: "left"  },
          });
        });
      }
    };
    addBlocks(root);
    return { newBlocks, newEdges };
  };

  const importMarkdown = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const tree = parseMarkdownTree(r.result);
        // Place at current view center so the user sees it immediately
        const cx = (-view.x + window.innerWidth  / 2) / view.scale;
        const cy = (-view.y + window.innerHeight / 2) / view.scale;
        const { newBlocks, newEdges } = buildMindMapFromTree(tree, cx - 200, cy - 200);
        if (!newBlocks.length) { alert("Nenhum título encontrado no arquivo Markdown."); return; }
        setBlocks(prev => [...prev, ...newBlocks]);
        setEdges(prev => [...prev, ...newEdges]);
      } catch (err) {
        console.error(err);
        alert("Erro ao importar: " + err.message);
      }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  /* ----- edge paths ----- */
  const STUB_LEN = 56;
  const PORT_DIR = {
    top:    { x: 0, y:-1 },
    bottom: { x: 0, y: 1 },
    left:   { x:-1, y: 0 },
    right:  { x: 1, y: 0 },
  };
  const edgePaths = edges.map(e => {
    const a = blocksById.get(e.from.id);
    const b = blocksById.get(e.to.id);
    if (!a || !b) return null;
    const sourceHidden = hiddenBlockIds.has(a.id);
    const targetHidden = hiddenBlockIds.has(b.id);

    const dir1 = PORT_DIR[e.from.port] || { x: 1, y: 0 };
    const dir2 = PORT_DIR[e.to.port]   || { x:-1, y: 0 };

    if (e.collapsed) {
      // Draw a stub sprouting from the CLICKED (near) port
      const backward = e.collapseDir === "backward";
      const nearBlock   = backward ? b : a;
      const nearPort    = backward ? e.to.port : e.from.port;
      const nearHidden  = backward ? targetHidden : sourceHidden;
      if (nearHidden) return null;
      const p1 = portWorldPos(a, e.from.port);
      const p2 = portWorldPos(b, e.to.port);
      const nearPos = backward ? p2 : p1;
      const dir = PORT_DIR[nearPort] || { x: 1, y: 0 };
      const stubEnd = { x: nearPos.x + dir.x * STUB_LEN, y: nearPos.y + dir.y * STUB_LEN };
      return {
        id: e.id,
        curveD: orthogonalPath(p1, dir1, p2, dir2),
        stubD: `M ${nearPos.x} ${nearPos.y} L ${stubEnd.x} ${stubEnd.y}`,
        stubEnd,
        color: nearBlock.color || DEFAULT_COLOR,
        collapsed: true,
        count: collapsedCount(e),
      };
    }

    // Non-collapsed edge: hide entirely if either endpoint is in the hidden set
    if (sourceHidden || targetHidden) return null;
    const p1 = portWorldPos(a, e.from.port);
    const p2 = portWorldPos(b, e.to.port);
    const wps = e.waypoints || [];
    const style = e.style || "ortho";
    const pts = [p1, ...wps, p2];

    // Choose how to draw the path: auto-route when straight, route through waypoints when bent
    let curveD;
    if (wps.length === 0) {
      if (style === "straight")      curveD = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
      else if (style === "curved")   curveD = dirBezier(p1, dir1, p2, dir2);
      else                           curveD = orthogonalPath(p1, dir1, p2, dir2);
    } else {
      if (style === "curved")        curveD = catmullRomPath(pts);
      else if (style === "straight") curveD = roundedPolyPath(pts, 0);
      else                           curveD = roundedPolyPath(pts, 14);
    }
    // Midpoint of the central segment — anchors the style toggle
    const mi = Math.floor((pts.length - 1) / 2);
    const mid = { x: (pts[mi].x + pts[mi+1].x) / 2, y: (pts[mi].y + pts[mi+1].y) / 2 };

    return {
      id: e.id,
      curveD,
      stubD: "",
      stubEnd: { x: 0, y: 0 },
      color: a.color || DEFAULT_COLOR,
      fromColor: a.color || DEFAULT_COLOR,
      toColor:   b.color || DEFAULT_COLOR,
      p1, p2, pts, wps, mid, style,
      collapsed: false,
      count: 0,
    };
  }).filter(Boolean);

  /* ----- render ----- */
  return (
    <>
      <div className="bg" />

      {!present && (
      <div className="toolbar">
        <button className={`tool ${tool==="select"?"active":""}`} onClick={() => setTool("select")}>◉ SELECIONAR</button>
        <button className={`tool ${tool==="block"?"active":""}`} onClick={() => setTool("block")}>▭ BLOCO</button>
        <button className={`tool ${tool==="draw"?"active":""}`} onClick={() => setTool("draw")}>✎ ANOTAÇÃO</button>
        <div className="sep"/>
        <button className="tool" onClick={undo} title="Desfazer (Ctrl+Z)">↶</button>
        <button className="tool" onClick={redo} title="Refazer (Ctrl+Shift+Z / Ctrl+Y)">↷</button>
        <div className="sep"/>
        <button className="tool" onClick={fitAll}>⊡ FIT</button>
        <button className="tool" onClick={() => setView({x:0,y:0,scale:1})}>1:1</button>
        <button className={`tool ${flow?"active":""}`} onClick={() => setFlow(f => !f)} title="Liga/desliga o fluxo de energia nas conexões">⚡ FLUXO</button>
        <button className="tool" onClick={enterPresent} title="Modo apresentação (P)">▶ APRESENTAR</button>
        <div className="sep"/>
        <button className="tool" onClick={exportJSON}>⤓ SALVAR</button>
        <button className="tool" onClick={() => fileRef.current.click()}>⤒ CARREGAR</button>
        <button className="tool" onClick={() => mdRef.current.click()} title="Importar Markdown (.md) — cria blocos a partir dos títulos #/##/###">📥 IMPORTAR MD</button>
        <button className="tool" onClick={exportPNG} title="Exportar o mapa como imagem PNG">🖼 PNG</button>
        <div className="sep"/>
        <button className="tool danger" onClick={clearAll}>✕ LIMPAR</button>
      </div>
      )}

      {present && (
        <div className="presentbar">
          <button className="tool" onClick={() => goToPresent(focusIdx - 1)} title="Anterior (←)">◀</button>
          <span className="pcount">{presentOrder.length ? focusIdx + 1 : 0} / {presentOrder.length}</span>
          <button className="tool" onClick={() => goToPresent(focusIdx + 1)} title="Próximo (→ / espaço)">▶</button>
          <div className="sep"/>
          <button className="tool danger" onClick={exitPresent} title="Sair (Esc)">✕ SAIR</button>
        </div>
      )}

      {(editingBodyId || editingTitleId || editingNoteId) && (
        <div className="drawbar" onMouseDown={(e) => e.preventDefault()}>
          <div className="group">
            <span className="lbl">Texto</span>
            <button className="fmt-btn b" onMouseDown={(e) => { e.preventDefault(); applyFormat("bold"); }} title="Negrito (Ctrl+B)">B</button>
            <button className="fmt-btn i" onMouseDown={(e) => { e.preventDefault(); applyFormat("italic"); }} title="Itálico (Ctrl+I)">I</button>
            <button className="fmt-btn u" onMouseDown={(e) => { e.preventDefault(); applyFormat("underline"); }} title="Sublinhado (Ctrl+U)">U</button>
          </div>
          <div className="vsep"/>
          <div className="group">
            <span className="lbl">Tamanho</span>
            {[11, 14, 18, 24].map(sz => (
              <button
                key={sz}
                className="fmt-btn"
                onMouseDown={(e) => { e.preventDefault(); applyFontSize(sz); }}
                style={{ fontSize: Math.min(sz, 18) + "px", fontWeight: 700 }}
                title={`${sz}px`}
              >A</button>
            ))}
          </div>
          <div className="vsep"/>
          <div className="group">
            <span className="lbl">Cor</span>
            {PRESET_COLORS.map(c => (
              <div
                key={c}
                className="swatch"
                style={{ background: c, color: c, width: 20, height: 20 }}
                onMouseDown={(e) => { e.preventDefault(); applyTextColor(c); }}
                title={c}
              />
            ))}
            <label className="swatch custom" style={{ width: 20, height: 20 }} title="Cor personalizada">
              <input type="color" onMouseDown={(e) => e.preventDefault()} onChange={(e) => applyTextColor(e.target.value)} />
            </label>
          </div>
        </div>
      )}

      {!editingBodyId && !editingTitleId && !editingNoteId && tool === "draw" && selection.size === 0 && (
        <div className="drawbar" onMouseDown={(e) => e.stopPropagation()}>
          <div className="group">
            <span className="lbl">Forma</span>
            <button className={`shape-btn ${drawShape==="text"?"active":""}`} onClick={() => setDrawShape("text")} title="Texto — clique no canvas para escrever">
              <svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="5"/><line x1="12" y1="5" x2="12" y2="20"/></svg>
            </button>
            <button className={`shape-btn ${drawShape==="freehand"?"active":""}`} onClick={() => setDrawShape("freehand")} title="Pincel livre (mão livre)">
              <svg viewBox="0 0 24 24"><path d="M3 17 Q 7 5, 12 12 T 21 9"/></svg>
            </button>
            <button className={`shape-btn ${drawShape==="line"?"active":""}`} onClick={() => setDrawShape("line")} title="Linha reta (Shift = 45°)">
              <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
            </button>
            <button className={`shape-btn ${drawShape==="arrow"?"active":""}`} onClick={() => setDrawShape("arrow")} title="Seta (Shift = 45°)">
              <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/><polyline points="20,12 20,4 12,4"/></svg>
            </button>
            <button className={`shape-btn ${drawShape==="rect"?"active":""}`} onClick={() => setDrawShape("rect")} title="Retângulo (Shift = quadrado)">
              <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
            </button>
            <button className={`shape-btn ${drawShape==="ellipse"?"active":""}`} onClick={() => setDrawShape("ellipse")} title="Elipse (Shift = círculo)">
              <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="6"/></svg>
            </button>
            <button className={`shape-btn eraser ${drawShape==="eraser"?"active":""}`} onClick={() => setDrawShape("eraser")} title="Borracha (clique num traço para apagar)">
              <svg viewBox="0 0 24 24"><path d="M15 3 L21 9 L11 19 L5 19 L5 13 Z"/><line x1="3" y1="22" x2="21" y2="22"/></svg>
            </button>
          </div>
          <div className="vsep"/>
          <div className="group">
            <span className="lbl">{drawShape==="text" ? "Tamanho" : "Espessura"}</span>
            {drawShape === "text" ? (
              [12, 16, 22, 32].map(sz => (
                <button
                  key={sz}
                  className={`width-btn ${drawFontSize===sz?"active":""}`}
                  onClick={() => setDrawFontSize(sz)}
                  style={{ color: drawColor, fontSize: Math.min(sz, 20)+"px", fontWeight: 700, fontStyle: "italic" }}
                  title={`${sz}px`}
                >T</button>
              ))
            ) : (
              [2,4,7,11].map(w => (
                <button
                  key={w}
                  className={`width-btn ${drawWidth===w?"active":""}`}
                  onClick={() => setDrawWidth(w)}
                  style={{ color: drawColor }}
                  title={`${w}px`}
                >
                  <div className="dot" style={{ width: w+"px", height: w+"px" }} />
                </button>
              ))
            )}
          </div>
          <div className="vsep"/>
          <div className="group">
            <span className="lbl">Cor</span>
            {PRESET_COLORS.map(c => (
              <div
                key={c}
                className="swatch"
                style={{ background: c, color: c, width: 20, height: 20, boxShadow: drawColor === c ? `0 0 0 2px #fff, 0 0 10px ${c}` : `0 0 8px ${c}` }}
                onClick={() => setDrawColor(c)}
                title={c}
              />
            ))}
            <label className="swatch custom" style={{ width: 20, height: 20 }} title="Cor personalizada">
              <input type="color" value={drawColor} onChange={(e) => setDrawColor(e.target.value)} />
            </label>
          </div>
        </div>
      )}

      {(() => {
        if (editingBodyId || editingTitleId || editingNoteId) return null;
        const hasStrokeSel = strokes.some(s => selection.has(s.id));
        const hasNoteSel   = notes.some(n => selection.has(n.id));
        const hasBlockSel  = blocks.some(b => selection.has(b.id));
        const hasAny = hasStrokeSel || hasNoteSel || hasBlockSel;
        if (!hasAny) return null;
        // Build a representative color for swatch "active" ring
        let activeColor = null;
        if (hasBlockSel) activeColor = blocks.find(b => selection.has(b.id))?.color;
        else if (hasNoteSel) activeColor = notes.find(n => selection.has(n.id))?.color;
        else if (hasStrokeSel) activeColor = strokes.find(s => selection.has(s.id))?.color;
        return (
          <div className="drawbar" onMouseDown={(e) => e.stopPropagation()}>
            <div className="group">
              <span className="lbl">Cor</span>
              {PRESET_COLORS.map(c => (
                <div
                  key={c}
                  className="swatch"
                  style={{
                    background: c, color: c, width: 20, height: 20,
                    boxShadow: activeColor === c ? `0 0 0 2px #fff, 0 0 10px ${c}` : `0 0 8px ${c}`,
                  }}
                  title={c}
                  onClick={() => setBlockColor(c)}
                />
              ))}
              <label className="swatch custom" style={{ width: 20, height: 20 }} title="Cor personalizada">
                <input type="color" onChange={(e) => setBlockColor(e.target.value)} />
              </label>
            </div>
            {hasStrokeSel && (
              <>
                <div className="vsep"/>
                <div className="group">
                  <span className="lbl">Espessura</span>
                  {[2,4,7,11].map(w => {
                    const sel = strokes.find(s => selection.has(s.id));
                    const active = sel && sel.width === w;
                    return (
                      <button
                        key={w}
                        className={`width-btn ${active?"active":""}`}
                        onClick={() => setSelectedStrokeWidth(w)}
                        style={{ color: activeColor || "#00f0ff" }}
                        title={`${w}px`}
                      >
                        <div className="dot" style={{ width: w+"px", height: w+"px" }} />
                      </button>
                    );
                  })}
                </div>
              </>
            )}
            {hasNoteSel && (
              <>
                <div className="vsep"/>
                <div className="group">
                  <span className="lbl">Tamanho</span>
                  {[12,16,22,32].map(sz => {
                    const sel = notes.find(n => selection.has(n.id));
                    const active = sel && sel.fontSize === sz;
                    return (
                      <button
                        key={sz}
                        className={`width-btn ${active?"active":""}`}
                        onClick={() => setSelectedFontSize(sz)}
                        style={{ color: activeColor || "#ff9d00", fontSize: Math.min(sz, 20)+"px", fontWeight: 700, fontStyle: "italic" }}
                        title={`${sz}px`}
                      >T</button>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        );
      })()}

      <div
        ref={wsRef}
        className={`workspace ${tool === "block" ? "tool-block" : ""} ${tool === "note" ? "tool-note" : ""} ${tool === "draw" && drawShape !== "eraser" ? "tool-draw" : ""} ${tool === "draw" && drawShape === "eraser" ? "tool-eraser" : ""}`}
        onMouseDown={onWorkspaceDown}
        onDoubleClick={(e) => {
          // Double-click on empty canvas creates a new block
          if (tool !== "select") return;
          if (e.target !== wsRef.current && !e.target.classList.contains("world") && e.target.tagName !== "svg") return;
          const wp = screenToWorld(e.clientX, e.clientY);
          createBlock(wp.x, wp.y);
        }}
        onWheel={onWheel}
      >
        <div className={`world ${present ? "present" : ""}`} style={{ transform:`translate(${view.x}px,${view.y}px) scale(${view.scale})` }}>
          {/* freehand strokes + shapes (rendered beneath blocks) */}
          <svg className="strokes" xmlns="http://www.w3.org/2000/svg">
            {strokes.map(s => {
              const d = strokeToPath(s);
              if (!d) return null;
              const isSel = selection.has(s.id);
              return (
                <g
                  key={s.id}
                  className={isSel ? "selected" : ""}
                  transform={`translate(${s.x||0},${s.y||0})`}
                  style={{ color: s.color || DEFAULT_COLOR }}
                >
                  <path
                    d={d}
                    className="stroke-hit"
                    onMouseDown={(ev) => {
                      ev.stopPropagation();
                      if (tool === "draw" && drawShape === "eraser") {
                        setStrokes(p => p.filter(x => x.id !== s.id));
                        return;
                      }
                      selectOne(s.id, ev.shiftKey);
                      startDrag(ev, s.id);
                    }}
                  />
                  <path
                    d={d}
                    className="stroke-line"
                    style={{ stroke: s.color || DEFAULT_COLOR, strokeWidth: s.width || 3 }}
                  />
                </g>
              );
            })}
            {drawing && (() => {
              const d = strokeToPath(drawing);
              if (!d) return null;
              return (
                <path
                  d={d}
                  className="stroke-line"
                  style={{ stroke: drawing.color, strokeWidth: drawing.width, color: drawing.color }}
                />
              );
            })()}
          </svg>

          <svg className="edges" xmlns="http://www.w3.org/2000/svg">
            <defs>
              {edgePaths.filter(p => !p.collapsed && p.fromColor !== p.toColor).map(p => (
                <linearGradient
                  key={`g-${p.id}`}
                  id={`edge-g-${p.id}`}
                  gradientUnits="userSpaceOnUse"
                  x1={p.p1.x} y1={p.p1.y}
                  x2={p.p2.x} y2={p.p2.y}
                >
                  <stop offset="0%"   stopColor={p.fromColor} style={{ stopColor: p.fromColor }} />
                  <stop offset="100%" stopColor={p.toColor}   style={{ stopColor: p.toColor   }} />
                </linearGradient>
              ))}
            </defs>
            {edgePaths.map(p => {
              const useGradient = !p.collapsed && p.fromColor !== p.toColor;
              const strokeVal = useGradient ? `url(#edge-g-${p.id})` : p.color;
              const isSel = selectedEdge === p.id;
              return (
                <g key={p.id}>
                  {/* Full curve — visible when not collapsed */}
                  <path
                    d={p.curveD}
                    className={p.collapsed ? "gone" : ""}
                    stroke={strokeVal}
                    strokeWidth={isSel ? 4 : 2.2}
                    style={{
                      filter: isSel
                        ? `drop-shadow(0 0 8px #fff) drop-shadow(0 0 6px ${p.toColor || p.color})`
                        : `drop-shadow(0 0 4px ${p.fromColor || p.color}) drop-shadow(0 0 4px ${p.toColor || p.color})`,
                    }}
                  />
                  {/* Energy beam running source → target. Two layers, both using
                      the edge's own gradient so even the GLOW follows the degradê:
                      a thick blurred halo + a crisp core, flowing together. */}
                  {flow && !p.collapsed && (() => {
                    const fStroke = useGradient ? `url(#edge-g-${p.id})` : p.color;
                    return (
                      <>
                        <path d={p.curveD} className="flow-glow"  stroke={fStroke} />
                        <path d={p.curveD} className="flow"       stroke={fStroke} />
                        <path d={p.curveD} className="flow-spark" stroke={fStroke} />
                      </>
                    );
                  })()}
                  {/* Short stub — visible when collapsed */}
                  <path
                    d={p.stubD}
                    className={"stub " + (p.collapsed ? "" : "gone")}
                    stroke={p.color}
                    style={{ filter: `drop-shadow(0 0 6px ${p.color})` }}
                  />
                  {/* Invisible thick hit area — click selects, drag bends the line */}
                  <path
                    d={p.collapsed ? p.stubD : p.curveD}
                    fill="none"
                    stroke="transparent"
                    strokeWidth={18}
                    style={{ pointerEvents: "stroke", cursor: p.collapsed ? "pointer" : "grab" }}
                    onMouseDown={(ev) => {
                      ev.stopPropagation();
                      if (p.collapsed) { clearSelection(); setSelectedEdge(p.id); return; }
                      // Start a press: a tiny move turns it into a bend (waypoint), else it's a select
                      edgeEditRef.current = {
                        kind: "press", edgeId: p.id,
                        startScreen: { x: ev.clientX, y: ev.clientY },
                        wp: screenToWorld(ev.clientX, ev.clientY),
                        pts: p.pts,
                      };
                    }}
                  />
                </g>
              );
            })}
            {preview && <path d={bezierPath(preview.from, preview.to)} className="preview" />}
          </svg>

          {/* collapse badges — positioned at the stub's outer end */}
          {edgePaths.filter(p => p.collapsed).map(p => (
            <div
              key={"badge-"+p.id}
              className="collapse-badge-wrap"
              style={{ left: p.stubEnd.x, top: p.stubEnd.y, color: p.color }}
              onMouseDown={(e) => { e.stopPropagation(); toggleEdgeCollapse(p.id); }}
              title="Expandir"
            >
              <div className="collapse-badge" style={{ color: p.color }}>
                <span className="icon">+</span>{p.count}
              </div>
            </div>
          ))}

          {blocks.map(b => (
            <Block
              key={b.id}
              block={b}
              selected={selection.has(b.id)}
              hidden={hiddenBlockIds.has(b.id)}
              focused={present && b.id === focusId}
              pendingEditRef={pendingEditRef}
              onSelect={selectOne}
              onStartDrag={(e) => startDrag(e, b.id)}
              onStartConnection={startConnection}
              onStartResize={startResize}
              onDelete={deleteBlock}
              onChange={updateBlock}
              onEditingBodyChange={(id, on) => {
                if (on) setEditingBodyId(id);
                else setEditingBodyId(curr => curr === id ? null : curr);
              }}
              onEditingTitleChange={(id, on) => {
                if (on) setEditingTitleId(id);
                else setEditingTitleId(curr => curr === id ? null : curr);
              }}
            />
          ))}
          {notes.map(n => (
            <Note
              key={n.id}
              note={n}
              selected={selection.has(n.id)}
              onSelect={selectOne}
              onStartDrag={(e) => startDrag(e, n.id)}
              onChange={updateNote}
              onEditingChange={(id, on) => {
                if (on) setEditingNoteId(id);
                else setEditingNoteId(curr => curr === id ? null : curr);
              }}
              onEraser={(id) => {
                if (tool === "draw" && drawShape === "eraser") {
                  setNotes(p => p.filter(x => x.id !== id));
                  return true;
                }
                return false;
              }}
            />
          ))}

          {/* connection edit handles — shown for the selected (non-collapsed) edge.
              Rendered after blocks so they sit above the ports and stay clickable.
              scale(1/view.scale) keeps them a constant size on screen at any zoom. */}
          {selectedEdge && (() => {
            const p = edgePaths.find(x => x.id === selectedEdge);
            if (!p || p.collapsed) return null;
            const inv = `scale(${1/view.scale})`;
            const styleLabel = p.style === "curved" ? "↝ CURVA" : p.style === "straight" ? "╱ RETA" : "⌐ ORTO";
            return (
              <div className="edge-edit">
                <div
                  className="edge-style-btn"
                  style={{ left: p.mid.x, top: p.mid.y, color: p.toColor || p.color, transform: `translate(-50%,-50%) ${inv}` }}
                  title="Estilo da linha: ortogonal → curva → reta"
                  onMouseDown={(e) => { e.stopPropagation(); cycleEdgeStyle(p.id); }}
                >{styleLabel}</div>
                {[["from", p.p1, p.fromColor], ["to", p.p2, p.toColor]].map(([end, pos, col]) => (
                  <div
                    key={end}
                    className="edge-handle endpoint"
                    style={{ left: pos.x, top: pos.y, color: col, transform: `translate(-50%,-50%) ${inv}` }}
                    title="Arraste para outra porta"
                    onMouseDown={(e) => {
                      e.stopPropagation();
                      edgeEditRef.current = { kind: "endpoint", edgeId: p.id, end, fixed: end === "from" ? p.p2 : p.p1, moved: false };
                    }}
                  />
                ))}
                {p.wps.map((w, i) => (
                  <div
                    key={"wp"+i}
                    className="edge-handle waypoint"
                    style={{ left: w.x, top: w.y, color: p.toColor || p.color, transform: `translate(-50%,-50%) ${inv}` }}
                    title="Arraste para mover · duplo-clique remove"
                    onMouseDown={(e) => { e.stopPropagation(); edgeEditRef.current = { kind: "waypoint", edgeId: p.id, index: i }; }}
                    onDoubleClick={(e) => { e.stopPropagation(); removeWaypoint(p.id, i); }}
                  />
                ))}
              </div>
            );
          })()}
        </div>
      </div>

      <div className="zoom">{Math.round(view.scale*100)}%</div>
      <div className="hint">
        <b>B</b> bloco • <b>N</b> texto • <b>D</b> desenho • <b>P</b> apresentar • <b>Ctrl+Z</b> desfazer • <b>arrasta a linha</b> dobrar • <b>clica na linha</b> editar/estilo • <b>duplo-clique</b> editar • <b>Del</b> apagar
      </div>

      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importJSON} />
      <input ref={mdRef} type="file" accept=".md,.markdown,.txt" style={{display:"none"}} onChange={importMarkdown} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
